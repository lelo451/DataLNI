spring:
  application:
    name: Data LNI
  # Runs the dev profile (in-memory users) unless an explicit profile is set.
  profiles:
    default: dev
  jpa:
    hibernate:
      # Never create/alter the corporate schema; mappings are validated against it.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.default_schema: PLD
      # The corporate DB2 is LUW 9.7, which lacks the "OFFSET ? ROWS FETCH FIRST ?"
      # syntax that Hibernate 7's stock DB2Dialect always emits (SQLCODE -104). This
      # custom dialect restores the legacy ROW_NUMBER()/FETCH FIRST pagination.
      hibernate.dialect: com.lni.datalni.config.DB2v97Dialect

logging:
  level:
    root: INFO
    com.lni.datalni: INFO
