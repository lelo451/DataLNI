spring:
  application:
    name: Data LNI
  # Runs the dev profile (in-memory users) unless an explicit profile is set.
  profiles:
    default: dev
  jpa:
    hibernate:
      # Never create/alter the corporate schema; mappings are validated against it.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.default_schema: PLD
      # Hibernate 5.6's stock DB2Dialect emits the legacy ROW_NUMBER()/FETCH FIRST
      # pagination DB2 LUW 9.7 accepts — no custom subclass needed on this Hibernate
      # line. Paged queries still need a stable ORDER BY (the views sort by id).
      hibernate.dialect: org.hibernate.dialect.DB2Dialect

server:
  servlet:
    # ZK auto-installs an HttpSessionListener; this keeps idle sessions cheap.
    session:
      timeout: 30m

zk:
  # Required for WAR packaging: gates ZkAutoConfiguration's DHtmlLayoutServlet
  # registration for *.zul / *.zhtml. Without it Tomcat's default servlet serves
  # .zul as a static download instead of routing to ZK.
  springboot-packaging: war


logging:
  level:
    root: INFO
    com.lni.datalni: INFO
